name: 'Gaslite Analyzer'
description: 'Autonomous YUL gas optimization agent for Mantle L2 smart contracts'
author: 'Gaslite'

branding:
  icon: 'zap'
  color: 'yellow'

inputs:
  gaslite-api-url:
    description: 'URL of your deployed Gaslite API'
    required: true
  gaslite-api-key:
    description: 'API key for Gaslite (optional, for private deployments)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for posting PR comments'
    required: true
    default: ${{ github.token }}
  min-gas-savings:
    description: 'Minimum gas savings to report (skip files below this threshold)'
    required: false
    default: '100'
  fail-on-unoptimized:
    description: 'Fail the Action if unoptimized code is found'
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'